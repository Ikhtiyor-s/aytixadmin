server {
    listen 80;
    server_name aytix.uz www.aytix.uz admin.aytix.uz api.aytix.uz;
    return 301 https://$host$request_uri;
}

# aytix.uz — marketplace frontend
server {
    listen 443 ssl;
    server_name aytix.uz www.aytix.uz;

    ssl_certificate /etc/letsencrypt/live/aytix.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aytix.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# admin.aytix.uz — admin panel frontend
server {
    listen 443 ssl;
    server_name admin.aytix.uz;

    ssl_certificate /etc/letsencrypt/live/aytix.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aytix.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# api.aytix.uz — backend API
server {
    listen 443 ssl;
    server_name api.aytix.uz;

    ssl_certificate /etc/letsencrypt/live/aytix.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aytix.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:10018;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://localhost:10018/uploads/;
    }
}
