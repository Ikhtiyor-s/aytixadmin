version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: aytix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cursor_market
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aytix_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cursor_market
      SECRET_KEY: dev-secret-key-change-in-production-2024
      DEBUG: "true"
      ALLOW_LOCALHOST: "true"
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        API_PROXY_URL: http://backend:8000/api/v1
    container_name: aytix_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      API_PROXY_URL: http://backend:8000/api/v1
    ports:
      - "3004:3004"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
